[package]
name = "object_store_metrics"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies] # In alphabetical order
async-trait = "0.1.89"
bloom2 = "0.5.1"
bytes = "1.11"
futures = "0.3"
iox_time = { path = "../iox_time" }
metric = { path = "../metric" }
object_store = { workspace = true }
tracing = { workspace = true }
pin-project = "1.1.11"
tokio = { version = "1.52", features = ["io-util"] }
tracker = { path = "../tracker" }

[dev-dependencies] # In alphabetical order
futures_test_utils = { path = "../futures_test_utils" }
insta = { version = "1", features = ["yaml"] }
object_store_mem_cache = { path = "../object_store_mem_cache" }
object_store_mock = { path = "../object_store_mock" }
object_store_size_hinting = { path = "../object_store_size_hinting" }
rust_decimal = "1.41.0"
tempfile = "3.27.0"
test_helpers = { path = "../test_helpers" }
tokio = { version = "1.52", features = ["macros", "io-util"] }
