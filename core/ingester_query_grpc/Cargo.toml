[package]
name = "ingester_query_grpc"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies] # In alphabetical order
base64 = "0.22"
data_types = { path = "../data_types" }
datafusion = { workspace = true }
