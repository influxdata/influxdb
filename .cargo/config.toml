# Local development overrides for Linux with lld
# These flags are commented out by target-env in CI builds

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "--cfg", "tokio_unstable",
    # Faster linker (requires lld installed locally)
    "-C", "link-arg=-fuse-ld=lld",
    # Fix `perf` profiling - see https://bugs.chromium.org/p/chromium/issues/detail?id=919499#c16
    "-C", "link-arg=-Wl,--no-rosegment",
    "-C", "target-cpu=haswell",
    "-C", "force-frame-pointers=yes",
]

[target.aarch64-unknown-linux-gnu]
rustflags = [
    "--cfg", "tokio_unstable",
    # Faster linker (requires lld installed locally)
    "-C", "link-arg=-fuse-ld=lld",
    # Fix `perf` profiling - see https://bugs.chromium.org/p/chromium/issues/detail?id=919499#c16
    "-C", "link-arg=-Wl,--no-rosegment",
    "-C", "force-frame-pointers=yes",
]
